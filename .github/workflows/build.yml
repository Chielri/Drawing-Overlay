permissions:
  contents: write
name: Build HTML
on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'build.sh'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build single-file HTML
        run: ./build.sh
      - name: Commit built file if changed
        run: |
          git diff --quiet pdf_overlay_compare.html && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf_overlay_compare.html
          git commit -m "Rebuild pdf_overlay_compare.html"
          git push
